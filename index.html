<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>Poker Hand Logger</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="top">
      <h1>Poker Hand Logger</h1>
      <button id="installBtn" class="btn ghost hidden">Install</button>
    </header>

    <main>
      <section class="panel compact">
        <div class="head"><h2>記録</h2><button id="resetCardsBtn" class="btn ghost">解除</button></div>
        <div class="recordTop">
          <div id="selectedCards" class="selected"><div class="empty">1枚目</div><div class="empty">2枚目</div></div>
          <button id="saveHandBtn" class="btn primary save saveSide">保存</button>
        </div>
        <div id="deckGrid" class="deck"></div>
        <div class="pick2">
          <div class="pickBlock"><div class="pickLabel">Position</div><input id="positionInput" type="hidden"><div id="positionPick" class="pickGrid posPick"></div></div>
          <div class="pickBlock"><div class="pickLabel">Action</div><input id="actionInput" type="hidden"><div id="actionPick" class="pickGrid actionPick"></div></div>
        </div>
        <label class="memo"><textarea id="memoInput" rows="1" placeholder="Memo"></textarea></label>
      </section>

      <section class="panel">
        <div class="head"><h2>履歴</h2><button id="toggleFiltersBtn" class="btn ghost">Filter</button></div>
        <div id="filters" class="filters hidden">
          <label>Position<select id="positionFilter"><option value="">すべて</option></select></label>
          <label>Action<select id="actionFilter"><option value="">すべて</option></select></label>
          <button id="clearFiltersBtn" class="btn sub">解除</button>
        </div>
        <div id="handHeatmap" class="heatmap"></div>
        <div id="historyList" class="history"></div>
      </section>

      <section class="panel compact">
        <div class="head"><h2>統計</h2></div>
        <div id="statsGrid" class="stats"></div>
      </section>

      <section class="panel compact">
        <div class="head"><h2>セッション</h2></div>
        <div class="row sessionRow"><select id="sessionSelect"></select><button id="editSessionBtn" class="btn ghost">編集</button><button id="newSessionBtn" class="btn sub">新規</button></div>
        <div id="sessionMeta" class="meta"></div>
      </section>

      <section class="panel compact">
        <div class="head"><h2>操作</h2></div>
        <div class="ops">
          <button id="exportBtn" class="btn sub">CSV出力</button>
          <label class="btn sub file">CSV読取<input id="importInput" type="file" accept=".csv,text/csv"></label>
          <button id="deleteSessionHandsBtn" class="btn danger">履歴全削除</button>
          <button id="deleteAllBtn" class="btn danger">全データ削除</button>
        </div>
      </section>
    </main>
  </div>

  <dialog id="sessionDialog">
    <form method="dialog" class="dialog">
      <h3 id="sessionDialogTitle">セッション</h3>
      <label>日付<input id="sessionDateInput" type="date" required></label>
      <label>追記<input id="sessionSuffixInput"></label>
      <label>種別<select id="sessionTypeInput"><option value="tournament">Tournament</option><option value="cash">Cash</option><option value="study">Study</option><option value="other">Other</option></select></label>
      <label>メモ<textarea id="sessionNoteInput" rows="2"></textarea></label>
      <div class="dialogBtns sessionDialogBtns">
        <button id="deleteSessionBtn" type="button" class="btn danger hidden">セッション削除</button>
        <button value="cancel" class="btn ghost">Cancel</button>
        <button id="saveSessionBtn" value="default" class="btn primary">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="editHandDialog">
    <form id="editHandForm" method="dialog" class="dialog">
      <h3>記録編集</h3>
      <div class="editGrid">
        <label>1枚目<select id="editCard1Input"></select></label>
        <label>2枚目<select id="editCard2Input"></select></label>
        <label>Position<select id="editPositionInput"></select></label>
        <label>Action<select id="editActionInput"></select></label>
      </div>
      <label>Memo<textarea id="editMemoInput" rows="2"></textarea></label>
      <div class="dialogBtns editHandDialogBtns">
        <button id="deleteEditHandBtn" type="button" class="btn danger">削除</button>
        <button value="cancel" class="btn ghost">Cancel</button>
        <button id="saveEditHandBtn" value="default" class="btn primary">保存</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
