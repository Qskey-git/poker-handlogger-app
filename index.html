<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>Poker Hand Logger</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="icon.png">
</head>
<body>
  <div class="app">
    <header class="top">
      <h1>Poker Hand Logger</h1>
      <button id="installBtn" class="btn ghost hidden">Install</button>
    </header>

    <main>
      <section class="panel compact">
        <div class="head"><h2>Record</h2><button id="resetCardsBtn" class="btn ghost">Reset</button></div>
        <div class="recordControls">
          <div class="cardColumn">
            <div id="selectedCards" class="selected"><div class="empty"></div><div class="empty"></div></div>
            <button id="saveHandBtn" class="btn primary save saveSide">Save</button>
          </div>
          <div class="pick2">
            <div class="pickBlock"><input id="positionInput" type="hidden"><div id="positionPick" class="pickGrid posPick"></div></div>
            <div class="pickBlock"><input id="actionInput" type="hidden"><div id="actionPick" class="pickGrid actionPick"></div></div>
          </div>
        </div>
        <div id="deckGrid" class="deck"></div>
        <label class="memo"><textarea id="memoInput" rows="1" placeholder="Memo"></textarea></label>
      </section>

      <section class="panel">
        <div class="head"><h2>History</h2><div class="historyActions"><button id="shareHeatmapBtn" class="btn ghost">Share</button><button id="toggleHeatmapBtn" class="btn ghost">Heatmap</button><button id="toggleFiltersBtn" class="btn ghost">Filter</button></div></div>
        <div id="filters" class="filters hidden">
          <label>Position<select id="positionFilter"><option value="">All</option></select></label>
          <label>Action<select id="actionFilter"><option value="">All</option></select></label>
          <button id="clearFiltersBtn" class="btn sub">Clear</button>
        </div>
        <div id="handHeatmap" class="heatmap"></div>
        <div id="historyList" class="history"></div>
      </section>

      <section class="panel compact">
        <div class="head"><h2>Statistics</h2></div>
        <div id="statsGrid" class="stats"></div>
      </section>

      <section class="panel compact">
        <div class="head sessionHead">
          <h2>Session</h2>
          <div class="sessionHeadActions">
            <button id="exportBtn" class="btn sub">Export CSV</button>
            <label class="btn sub file">Import CSV<input id="importInput" type="file" accept=".csv,text/csv"></label>
            <button id="newSessionBtn" class="btn sub">New</button>
          </div>
        </div>
        <div class="row sessionRow"><select id="sessionSelect"></select><button id="editSessionBtn" class="btn editSessionAction">Edit</button></div>
        <div id="sessionMeta" class="meta"></div>
      </section>
    </main>
  </div>

  <dialog id="sessionDialog">
    <form id="sessionForm" class="dialog">
      <h3 id="sessionDialogTitle">Session</h3>
      <label>Date<input id="sessionDateInput" type="date" required></label>
      <label>Note<input id="sessionSuffixInput"></label>
      <label>Type<select id="sessionTypeInput"><option value="mtt">MTT</option><option value="cash">Cash</option><option value="other">Other</option></select></label>
      <label>Memo<textarea id="sessionNoteInput" rows="2"></textarea></label>
      <div class="dialogBtns sessionDialogBtns">
        <button id="deleteSessionBtn" type="button" class="btn danger hidden">Delete session</button>
        <button id="cancelSessionBtn" type="button" class="btn ghost">Cancel</button>
        <button id="saveSessionBtn" type="button" class="btn primary">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="editHandDialog">
    <form id="editHandForm" class="dialog">
      <h3>Edit record</h3>
      <div class="editGrid">
        <label>1st hand<select id="editCard1Input"></select></label>
        <label>2nd hand<select id="editCard2Input"></select></label>
        <label>Position<select id="editPositionInput"></select></label>
        <label>Action<select id="editActionInput"></select></label>
      </div>
      <label>Memo<textarea id="editMemoInput" rows="2"></textarea></label>
      <div class="dialogBtns editHandDialogBtns">
        <button id="deleteEditHandBtn" type="button" class="btn danger">Delete record</button>
        <button id="cancelEditHandBtn" type="button" class="btn ghost">Cancel</button>
        <button id="saveEditHandBtn" type="button" class="btn primary">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="shareHeatmapDialog">
    <div class="dialog shareDialog">
      <div class="shareDialogHead">
        <h3>Heat Map Share</h3>
        <button id="closeShareHeatmapBtn" type="button" class="btn ghost">Close</button>
      </div>
      <img id="shareHeatmapImage" class="shareHeatmapImage" alt="Heat map image">
    </div>
  </dialog>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
